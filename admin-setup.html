<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Setup</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-image: url("images/logo.png");
      background-size: contain;
      background-repeat: repeat-x;
    }
    .box {
      background: white;
      border: lightblue solid 5px;
      border-radius: 20px;
      padding: 30px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid lightblue;
    }
    button {
      background: #1b5e3c;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: lightblue;
    }
  </style>
</head>
<body>

<div class="box">
  <img src="images/logo.png" style="width:100px;display:block;margin:auto;">
  <h2 style="text-align:center">Initial Admin Setup</h2>

  <form id="setupForm">
    <input type="text" id="username" placeholder="Username" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Create Admin</button>
  </form>
</div>

<script>
document.getElementById("setupForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value;

  const res = await fetch("https://vft-backend.onrender.com/api/admin/setup", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, email, password })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.message);
    return;
  }

  alert("Admin created successfully");
  window.location.href = "index.html";
});
</script>

</body>
</html>
