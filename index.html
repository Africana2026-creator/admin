<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-image: url("images/logo.png");
      background-size: contain;
      background-repeat: repeat-x;
    }
    .login-box {
      background: white;
      border: 10px solid lightblue;
      padding: 30px;
      width: 320px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid lightblue;
    }
    button {
      background: #1b5e3c;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: limegreen;
    }
    .new {
      background: #0f3d2e;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 10px;
    }
    .new:hover {
        background: lightblue;
      }
  </style>
</head>
<body>

<div class="login-box">
 
  <img src="images/logo.png" style="width:100px;display:block;margin:auto;">
  <h2 style="text-align:center">Admin Login</h2>

  <form id="loginForm">
    <input id="username" placeholder="Username" required>
    <input id="email" type="email" placeholder="Email" required>
    <input id="password" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
    
  </form>
  
</div>

<script src="admin-login.js"></script>

</body>
</html>
